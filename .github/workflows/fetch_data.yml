name: Fetch and Commit Stock Data

on:
  schedule:
    # Runs at 13:00 UTC (6:30 PM IST), Monday through Friday (after Indian markets close)
    - cron: '0 13 * * 1-5'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  run-and-commit:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write # Needed to push the committed file back to the repository

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Fetch Data Script
      run: |
        python scripts/fetch_data.py

    - name: Commit and Push updated JSON data
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add data/stocks.json
        git commit -m "Auto-update stock data: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" || echo "No changes to commit"
        git push
